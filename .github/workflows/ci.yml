name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: types · mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: mypy
        run: mypy --strict --explicit-package-bases .

  unit:
    name: test · unit + strategy + cursor harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest (unit)
        run: pytest -q -m "not slow and not integration and not e2e"

  det:
    name: test · determinism marker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest (det)
        run: pytest -q -m det

  security:
    name: test · security suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest (security)
        run: pytest -q tests/security

  e2e:
    name: test · e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest (e2e)
        run: pytest -q -m e2e

  backtest_smoke:
    name: smoke · backtests.smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: backtest smoke
        run: python -m backtests.smoke

  ai-evals:
    name: ai · prompt evals
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install python (eval extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ai-eval]"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install promptfoo
        run: npm install -g promptfoo@^0.95.0

      - name: deepeval (offline contract tests)
        env:
          OFFLINE_LLM: "true"
        run: pytest -q ai_evals/deepeval

      - name: promptfoo (offline assertions)
        env:
          OFFLINE_LLM: "true"
        working-directory: ai_evals/promptfoo
        run: promptfoo eval --no-cache --output ../../promptfoo-report.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promptfoo-report
          path: promptfoo-report.json

  frontend:
    name: frontend · lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://backend:8000

  gitleaks:
    name: security · gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: docker · build images
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit, det, security, e2e, backtest_smoke, frontend, gitleaks]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build trading-engine
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: trading-lab/engine:ci
      - name: build backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: trading-lab/backend:ci
      - name: build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          load: true
          tags: trading-lab/frontend:ci
