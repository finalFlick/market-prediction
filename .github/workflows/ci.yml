name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Public repo: default least privilege. Fork PRs never receive repo secrets;
# keep token scopes minimal for same-repo PRs too.
permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-trading-lab-python
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: types · mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-trading-lab-python
      - name: mypy
        run: mypy --strict --explicit-package-bases .

  unit:
    name: test · unit + strategy + cursor harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-trading-lab-python
      - name: pytest (unit)
        run: pytest -q -m "not slow and not integration and not e2e"

  det:
    name: test · determinism marker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-trading-lab-python
      - name: pytest (det)
        run: pytest -q -m det

  security:
    name: test · security suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-trading-lab-python
      - name: pytest (security)
        run: pytest -q tests/security

  e2e:
    name: test · e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-trading-lab-python
      - name: pytest (e2e)
        run: pytest -q -m e2e

  backtest_smoke:
    name: smoke · backtests.smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-trading-lab-python
      - name: backtest smoke
        run: python -m backtests.smoke

  ai-evals:
    name: ai · prompt evals
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-trading-lab-python
        with:
          pip-extras: dev,ai-eval

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install promptfoo
        run: npm install -g promptfoo@^0.95.0

      - name: deepeval (offline contract tests)
        env:
          OFFLINE_LLM: "true"
        run: pytest -q ai_evals/deepeval

      - name: promptfoo (offline assertions)
        env:
          OFFLINE_LLM: "true"
        working-directory: ai_evals/promptfoo
        run: promptfoo eval --no-cache --output ../../promptfoo-report.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promptfoo-report
          path: promptfoo-report.json

  frontend:
    name: frontend · lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://backend:8000

  gitleaks:
    name: security · gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: docker · build images
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit, det, security, e2e, backtest_smoke, frontend, gitleaks]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Must run on this same runner before backend/engine: separate jobs do not
      # share the local Docker image store unless pushed to a registry. We rely
      # on the per-branch GHA cache scope rather than the GHCR registry cache
      # because `cache-from: type=registry` aborts on cache miss (both 403 and
      # 404). The GHCR `:cache` ref is still populated by `trading-base.yml`
      # for external consumers; CI itself does not pull from it.
      - name: build trading-base (shared Python layers)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: false
          load: true
          tags: trading-base:latest
          cache-from: type=gha,scope=trading-base
          cache-to: type=gha,mode=max,scope=trading-base
      # build-contexts tells BuildKit (running in the docker-container driver)
      # that `FROM trading-base` resolves to the local Docker daemon's
      # `trading-base:latest` image (loaded by the previous step) instead of
      # docker.io/library/trading-base, which doesn't exist.
      - name: build trading-engine
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: trading-lab/engine:ci
          build-contexts: |
            trading-base=docker-image://trading-base:latest
          cache-from: type=gha,scope=trading-base
      - name: build backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: trading-lab/backend:ci
          build-contexts: |
            trading-base=docker-image://trading-base:latest
          cache-from: type=gha,scope=trading-base
      - name: build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          load: true
          tags: trading-lab/frontend:ci
