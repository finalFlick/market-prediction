name: trading-base

# Publishes the shared Python base image to GHCR. CI's `docker` job pulls
# from the resulting registry cache so backend / engine builds skip the heavy
# `pip install` layer entirely on warm runs.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.base"
      - "pyproject.toml"
      - ".github/workflows/trading-base.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: trading-base-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build · trading-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: lowercase repo owner
        id: owner
        run: |
          echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push trading-base
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/trading-lab-base:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.name }}/trading-lab-base:latest
          # cache-from intentionally omits type=registry,ref=:cache because
          # BuildKit aborts on cache miss instead of falling through. The GHA
          # scope warms across runs of this workflow on main, which is enough.
          cache-from: type=gha,scope=trading-base
          cache-to: |
            type=registry,ref=ghcr.io/${{ steps.owner.outputs.name }}/trading-lab-base:cache,mode=max
            type=gha,mode=max,scope=trading-base
