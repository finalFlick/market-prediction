# Build and deploy MkDocs to GitHub Pages (Actions artifact). Isolated from main app CI.
name: pages

on:
  push:
    branches:
      - experiment/specs-gh-pages
      - main
    paths:
      - "specs/**"
      - "docs/**"
      - "*.md"
      - "mkdocs.yml"
      - "docsite/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docsite/requirements.txt
      - name: install mkdocs
        run: |
          python -m pip install --upgrade pip
          pip install -r docsite/requirements.txt
      - name: mkdocs build
        run: mkdocs build
      - name: upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # No `environment: github-pages` here: that environment often restricts deploy
  # to `main` only, which blocks this branch. `deploy-pages@v4` works with
  # workflow `permissions: pages: write, id-token: write` only (see plan).
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deploy
        name: deploy to GitHub Pages
        uses: actions/deploy-pages@v4
