name: Setup trading-lab Python
description: Install editable trading-lab from repo root (CI only).
inputs:
  python-version:
    description: Python version for setup-python
    required: false
    default: "3.11"
  pip-extras:
    description: 'pip extras without brackets (e.g. dev or dev,ai-eval)'
    required: false
    default: "dev"
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: pip install editable
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[${{ inputs.pip-extras }}]"
