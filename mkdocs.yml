site_name: "Trading Lab · specs"
site_description: "Quant research platform — specification library and project docs (mirrored from repo)."
site_url: "https://finalflick.github.io/market-prediction/"
site_author: "Trading Lab"
repo_name: "finalFlick/market-prediction"
repo_url: "https://github.com/finalFlick/market-prediction"
# Disable “edit this page” (sources live in multiple roots; mirroring is build-time only).
edit_uri: ""

docs_dir: docsite
site_dir: site
strict: false

hooks:
  - docsite/hooks/sync_sources.py

theme:
  name: material
  language: en
  font:
    text: Roboto
    code: "JetBrains Mono"
  features:
    - navigation.path
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    scheme: slate
    primary: custom
    accent: custom
  icon:
    logo: material/library

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/finalFlick/market-prediction"

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.0/dist/mermaid.min.js
  - javascripts/mermaid-init.js

plugins:
  - search

markdown_extensions:
  - tables
  - attr_list
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tasklist:
      custom_checkbox: true
